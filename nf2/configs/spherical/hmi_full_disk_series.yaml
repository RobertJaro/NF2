---
path: "<<run_path>>"
work_path: "<<work_path>>"
meta_path: "<<meta_path>>"
logging:
  project: "<<wandb_project>>"
  name: "<<run_name>>"
data:
  geometry: spherical
  normalization:
    Mm_per_ds: 100
    Gauss_per_dB: 100
  max_radius: 1.3
  batch_size: 16384
  iterations: 2000
  data_module_workers: 16
  boundaries:
    - id: full_disk
      type: map
      batch_size: 8192
      requires_jacobian: false
      files:
        Br: "<<full_disk_Br_pattern>>"
        Bt: "<<full_disk_Bt_pattern>>"
        Bp: "<<full_disk_Bp_pattern>>"
      errors:
        Br_err: "<<full_disk_Br_err_pattern>>"
        Bt_err: "<<full_disk_Bt_err_pattern>>"
        Bp_err: "<<full_disk_Bp_err_pattern>>"
      mask_configs:
        type: mu_filter
        min: 0.2
    - id: synoptic
      type: map
      batch_size: 4096
      requires_jacobian: false
      files:
        Br: "<<synoptic_Br_pattern>>"
        Bt: "<<synoptic_Bt_pattern>>"
        Bp: "<<synoptic_Bp_pattern>>"
      mask_configs:
        type: reference
        file: "[[full_disk.files.Br]]"
        mu_filter:
          min: 0.2
  samplers:
    - id: random
      type: random_radial_grouped
      batch_size: 16384
      n_lat_lon_sample: 64
      radial_sampling_exponent: 2
  validation:
    - id: full_disk_valid
      type: map
      filter_nans: false
      shuffle: false
      plot_overview: false
      files:
        Br: "[[full_disk.files.Br]]"
        Bt: "[[full_disk.files.Bt]]"
        Bp: "[[full_disk.files.Bp]]"
      errors:
        Br_err: "[[full_disk.errors.Br_err]]"
        Bt_err: "[[full_disk.errors.Bt_err]]"
        Bp_err: "[[full_disk.errors.Bp_err]]"
      mask_configs:
        - type: mu_filter
          min: 0.2
    - id: synoptic_valid
      type: map
      filter_nans: false
      shuffle: false
      plot_overview: false
      files:
        Br: "[[synoptic.files.Br]]"
        Bt: "[[synoptic.files.Bt]]"
        Bp: "[[synoptic.files.Bp]]"
    - id: slices
      type: spherical_slices
      n_slices: 10
      plot_currents: true
    - id: sphere
      type: sphere
training:
  reload_dataloaders_every_n_epochs: 1
  check_val_every_n_epoch: 10
model:
  field: vector_potential
  network:
    type: siren
    hidden_dim: 512
    w0_initial: 1.0
losses:
  - type: boundary
    name: boundary
    weight: 1.0
    datasets: [full_disk, synoptic]
  - type: force_free
    name: force_free
    weight: 1.0e-2
    datasets: [random]
  - type: potential
    name: potential_top
    weight: 1.0e-2
    datasets: [random]
  - type: energy_gradient
    name: energy_gradient
    weight: 1.0e-2
    datasets: [random]
loss_scaling:
  - type: b_height
    name: b_height
    loss_ids: [force_free, potential_top, energy_gradient]
    power: 2
  - type: radial
    name: radial
    base_radius: 1.03
    max_radius: 1.3
    loss_ids: [energy_gradient, potential_top]
callbacks:
  - type: boundary
    name: boundary
    dataset: full_disk_valid
    component_labels: [r, t, p]
  - type: boundary
    name: synoptic_boundary
    dataset: synoptic_valid
    component_labels: [r, t, p]
  - type: metrics
    name: metrics
    dataset: sphere
  - type: spherical_slices
    dataset: slices
