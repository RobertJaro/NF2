---
path: "<<run_path>>"
work_path: "<<work_path>>"
logging:
  project: nf2
  name: "Spherical full-disk synoptic"
data:
  geometry: spherical
  normalization:
    Mm_per_ds: 100
    Gauss_per_dB: 1000
  max_radius: 1.3
  batch_size: 16384
  boundaries:
    - id: full_disk
      type: map
      batch_size: 8192
      requires_jacobian: false
      files:
        Br: "<<full_disk_Br>>"
        Bt: "<<full_disk_Bt>>"
        Bp: "<<full_disk_Bp>>"
      errors:
        Br_err: "<<full_disk_Br_err>>"
        Bt_err: "<<full_disk_Bt_err>>"
        Bp_err: "<<full_disk_Bp_err>>"
      mask_configs:
        type: mu_filter
        min: 0.2
    - id: synoptic
      type: map
      batch_size: 4096
      requires_jacobian: false
      files:
        Br: "<<synoptic_Br>>"
        Bt: "<<synoptic_Bt>>"
        Bp: "<<synoptic_Bp>>"
  samplers:
    - id: random
      type: random_radial_grouped
      batch_size: 16384
      n_lat_lon_sample: 64
      length: 10000
      radial_sampling_exponent: 2
  validation:
    - id: full_disk_valid
      type: map
      filter_nans: false
      shuffle: false
      plot_overview: false
      files:
        Br: "<<full_disk_Br>>"
        Bt: "<<full_disk_Bt>>"
        Bp: "<<full_disk_Bp>>"
    - id: slices
      type: spherical_slices
      n_slices: 10
    - id: sphere
      type: sphere
training:
  epochs: 100
model:
  field: vector_potential
  network:
    type: siren
    hidden_dim: 512
    w0_initial: 1.0
losses:
  - type: boundary
    name: boundary
    weight: 1.0
    datasets: [full_disk, synoptic]
  - type: force_free
    name: force_free
    weight: { start: 1.0e-4, end: 1.0e-2, iterations: 50000 }
    datasets: [random]
  - type: potential_top
    name: potential_top
    weight: { start: 1.0e-4, end: 1.0e-2, iterations: 50000 }
    datasets: [random]
  - type: energy_gradient
    name: energy_gradient
    weight: { start: 1.0e-4, end: 1.0e-2, iterations: 50000 }
    datasets: [random]
loss_scaling:
  - type: radial
    name: radial
    base_radius: 1.0
    max_radius: 1.3
    loss_ids: [force_free, potential_top, energy_gradient]
callbacks:
  - type: boundary
    dataset: full_disk_valid
    component_labels: [r, t, p]
  - type: metrics
    dataset: sphere
  - type: spherical_slices
    dataset: slices
