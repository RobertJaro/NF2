name: nf2
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      # Runtime dependencies
      - "torch>=2.12,<2.13"
      - "lightning==2.6.4"
      - "numpy>=1.26"
      - "scipy>=1.11"
      - "astropy>=6"
      - "sunpy[all]>=6"
      - "scikit-image>=0.22"
      - "scikit-learn>=1.3"
      - "matplotlib>=3.8"
      - "tqdm>=4.66"
      - "h5py>=3.10"
      - "PyYAML>=6"
      - "python-dateutil>=2.8"
      - "wandb>=0.27,<0.28"
      - "drms>=0.7"
      # Optional analysis dependencies
      - "pfsspy>=1.2"
      # Documentation dependencies
      - "sphinx>=7.2"
      - "myst-parser>=2"
      - "sphinx-autodoc-typehints>=2"
      - "sphinx-copybutton>=0.5"
      - "pydata-sphinx-theme>=0.15"
      # Development and packaging dependencies
      - "build>=1.2"
      - "pytest>=8"
      - "ruff>=0.5"
      - "mypy>=1.10"
      - "pre-commit>=3.7"
      - "twine>=5"
      - -e .
