{% set name = "nf2" %}
{% set version = "0.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - nf2-extrapolate = nf2.extrapolate:main
    - nf2-extrapolate-series = nf2.extrapolate_series:main
    - nf2-export = nf2.export:main
    - nf2-metrics = nf2.metrics:main
    - nf2-download = nf2.data.download:main
    - nf2-noaa-to-sharp = nf2.data.noaa_to_sharp:main

requirements:
  host:
    - python >=3.11,<3.13
    - pip
    - setuptools >=69
    - wheel
  run:
    - python >=3.11,<3.13
    - pytorch >=2.6,<2.13
    - torchvision >=0.21,<0.28
    - lightning =2.6.4
    - numpy >=1.26
    - scipy >=1.11
    - astropy >=6
    - sunpy >=6
    - scikit-image >=0.22
    - scikit-learn >=1.3
    - matplotlib-base >=3.8
    - tqdm >=4.66
    - h5py >=3.10
    - pyyaml >=6
    - python-dateutil >=2.8
    - wandb >=0.27,<0.28
    - drms >=0.7
    - reproject >=0.12
    - mpl-animators >=1.2

test:
  imports:
    - nf2
  commands:
    - nf2-extrapolate --help
    - nf2-extrapolate-series --help
    - nf2-export --help
    - nf2-metrics --help
    - nf2-download --help
    - nf2-noaa-to-sharp --help

about:
  home: https://github.com/RobertJaro/NF2
  license: GPL-3.0-only
  license_family: GPL
  summary: Neural non-linear force-free magnetic field extrapolation framework
