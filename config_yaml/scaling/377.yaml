---
base_path: "/glade/work/rjarolim/nf2/scaling/377_v04"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/377_v01"
logging:
  project: nf2-cartesian
  name: 377 - SIREN
data:
  type: cartesian
  train_configs:
    - type: fits
      ds_id: SHARP
      fits_path:
        Br: "/glade/work/rjarolim/data/nf2/377/hmi.sharp_cea_720s.377.20110215_000000_TAI.Br.fits"
        Bt: "/glade/work/rjarolim/data/nf2/377/hmi.sharp_cea_720s.377.20110215_000000_TAI.Bt.fits"
        Bp: "/glade/work/rjarolim/data/nf2/377/hmi.sharp_cea_720s.377.20110215_000000_TAI.Bp.fits"
      error_path:
        Br_err: "/glade/work/rjarolim/data/nf2/377/hmi.sharp_cea_720s.377.20110215_000000_TAI.Br_err.fits"
        Bt_err: "/glade/work/rjarolim/data/nf2/377/hmi.sharp_cea_720s.377.20110215_000000_TAI.Bt_err.fits"
        Bp_err: "/glade/work/rjarolim/data/nf2/377/hmi.sharp_cea_720s.377.20110215_000000_TAI.Bp_err.fits"
  num_workers: 8
  iterations: 10000

model:
  type: gauged_vector_potential
  dim: 256
  w0_initial: 5

training:
  epochs: 10

loss:
- type: boundary
  name: boundary
  lambda: 1.0
  ds_id: [SHARP]
- type: boundary
  name: potential_boundary
  lambda: 1.0
  ds_id: [potential]
- type: force_free
  name: force_free
  lambda: 1.0e-3
- type: sigma_j
  name: sigma_j
  lambda: 1.0e-1

loss_scaling:
  - type: exponential
    name: exponential_scaling
    loss_ids: [boundary, potential_boundary, force_free]

callbacks:
    # Boundary callbacks
  - type: boundary
    name: boundary
    ds_id: SHARP
  # Cube evaluation
  - type: metrics
    name: metrics
    ds_id: cube
  - type: slices
    ds_id: slices