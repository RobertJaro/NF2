        longitude_range: [ 301.5, 463.5 ]
        latitude_range: [ -78.9 , 65.1 ]
    - type: spherical_slices
      ds_id: slices
      n_slices: 10
      plot_currents: true
      longitude_range: [ 301.5, 463.5 ]
      latitude_range: [ -78.9 , 65.1 ]
    - type: sphere
      ds_id: sphere
      longitude_range: [ 301.5, 463.5 ]
      latitude_range: [ -78.9 , 65.1 ]
  max_radius: 1.3
  G_per_dB: 2000
  Mm_per_ds: 100
  num_workers: 8
  batch_size: 16384
  iterations: 10000
model:
  type: vector_potential
  dim: 512
training:
  epochs: 100
  loss_config:
    - type: boundary
      name: boundary
      lambda: {start: 1.0e+3, end: 1.0, iterations: 5.0e+4}
      ds_id: full_disk
    - type: boundary
      name: pfss_boundary
      lambda: 10.0
      ds_id: pfss_boundary
    - type: force_free
      lambda: 0.1
