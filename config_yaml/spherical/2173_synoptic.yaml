---
base_path: "/glade/work/rjarolim/nf2/spherical/2173_synoptic_v05"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/2173_synoptic_v05"
logging:
  project: spherical
  name: "2173 synoptic"
data:
  type: spherical
  train_configs:
    - type: map
      ds_id: full_disk
      batch_size: 65536
      files:
        Br: "/glade/work/rjarolim/data/global/fd_2173/hmi.synoptic_mr_polfil_720s.2173.Mr_polfil.fits"
        Bt: "/glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bt.fits"
        Bp: "/glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bp.fits"
    - type: random_spherical
      ds_id: random
      batch_size: 65536
  validation_configs:
    - type: map
      ds_id: full_disk_valid
      filter_nans: false
      shuffle: false
      plot_overview: false
      files:
        Br: "/glade/work/rjarolim/data/global/fd_2173/hmi.synoptic_mr_polfil_720s.2173.Mr_polfil.fits"
        Bt: "/glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bt.fits"
        Bp: "/glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bp.fits"
    - type: spherical_slices
      ds_id: slices
      n_slices: 10
      plot_currents: true
      longitude_range: [ 82.85, 244.83 ]
    - type: sphere
      ds_id: sphere
      longitude_range: [ 82.85, 244.83 ]
  max_radius: 1.3
  G_per_dB: 2000
  num_workers: 8
  batch_size: 16384
  iterations: 10000

model:
  type: vector_potential
  dim: 512

training:
  epochs: 100

loss:
  - type: boundary
    name: boundary
    lambda: {start: 1.0e+3, end: 1.0, iterations: 5.0e+4}
    ds_id: full_disk
#  - type: energy_gradient
#    lambda: 10.0
#    ds_id: random
#    base_radius: 1.04
#  - type: potential
#    lambda: 1.0e-2
#    ds_id: random
#    base_radius: 1.04
  - type: force_free
    lambda: 1.0e-1

callbacks:
  - type: boundary
    name: boundary
    ds_id: full_disk_valid
  - type: metrics
    name: metrics
    ds_id: sphere
  - type: spherical_slices
    ds_id: slices