---
base_path: "/glade/work/rjarolim/nf2/spherical/2173_synoptic_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/2173_synoptic_v01"
logging:
  project: spherical
  name: "2173 synoptic"
data:
  type: spherical
  train_configs:
    - type: map
      ds_id: synoptic
      batch_size: 8192
      files:
        Br: "/glade/work/rjarolim/data/global/fd_2173/hmi.synoptic_mr_polfil_720s.2173.Mr_polfil.fits"
        Bt: "/glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bt.fits"
        Bp: "/glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bp.fits"
    - type: random_radial_grouped
      ds_id: random
      batch_size: 16384
      length: 1.0e+4
  validation_configs:
    - type: map
      ds_id: synoptic_valid
      filter_nans: false
      shuffle: false
      plot_overview: false
      files:
        Br: "/glade/work/rjarolim/data/global/fd_2173/hmi.synoptic_mr_polfil_720s.2173.Mr_polfil.fits"
        Bt: "/glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bt.fits"
        Bp: "/glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bp.fits"
    - type: spherical_slices
      ds_id: slices
      n_slices: 10
      plot_currents: true
      longitude_range: [ 82.85, 244.83 ]
    - type: sphere
      ds_id: sphere
      longitude_range: [ 82.85, 244.83 ]
  max_radius: 1.3
  G_per_dB: 500
  num_workers: 16
  batch_size: 16384

model:
  type: vector_potential
  dim: 256
  encoding_config: { type: gaussian }

training:
  epochs: 30

loss:
  - type: boundary
    name: boundary
    lambda: 1.0
    ds_id: [ synoptic ]
  - type: force_free
    name: force_free
    lambda: 1.0e-3
    ds_id: [ random ]
  - type: potential
    name: potential
    lambda: 1.0e-4 #{type: step, steps: 5.0e+3, start: 1.0e-5, end: 0.0 }
    ds_id: [ random ]
  - type: energy_gradient
    name: energy_gradient
    lambda: 1.0e-3
    ds_id: [ random ]

loss_scaling:
  - type: b_height
    name: b_height
    loss_ids: [ force_free, potential, energy_gradient ]
  - type: radial
    name: radial
    base_radius: 1.1
    loss_ids: [ energy_gradient, potential ]


callbacks:
  - type: boundary
    name: boundary
    ds_id: synoptic_valid
  - type: metrics
    name: metrics
    ds_id: sphere
  - type: spherical_slices
    ds_id: slices