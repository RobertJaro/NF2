---
base_path: "/glade/work/rjarolim/nf2/spherical/comparison/377_cea_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/377_cea_v01"
logging:
  project: spherical
  name: "377 SHARP CEA"
data:
  type: cartesian
  train_configs:
    - type: sharp
      ds_id: sharp
      requires_jacobian: False
      fits_path:
        Br: "/glade/work/rjarolim/data/nf2/377/hmi.sharp_cea_720s.377.20110215_000000_TAI.Br.fits"
        Bt: "/glade/work/rjarolim/data/nf2/377/hmi.sharp_cea_720s.377.20110215_000000_TAI.Bt.fits"
        Bp: "/glade/work/rjarolim/data/nf2/377/hmi.sharp_cea_720s.377.20110215_000000_TAI.Bp.fits"
      error_path:
        Br_err: "/glade/work/rjarolim/data/nf2/377/hmi.sharp_cea_720s.377.20110215_000000_TAI.Br_err.fits"
        Bt_err: "/glade/work/rjarolim/data/nf2/377/hmi.sharp_cea_720s.377.20110215_000000_TAI.Bt_err.fits"
        Bp_err: "/glade/work/rjarolim/data/nf2/377/hmi.sharp_cea_720s.377.20110215_000000_TAI.Bp_err.fits"
  random_config: { type: height }
  num_workers: 16
  iterations: 10000
  z_range: [ 0, 100 ]

model:
  type: vector_potential
  dim: 256

training:
  epochs: 30

loss:
  - type: boundary
    name: boundary
    lambda: 1.0
    ds_id: sharp
  - type: boundary
    name: potential_boundary
    lambda: 1.0e+1
    ds_id: potential
  - type: force_free
    name: force_free
    lambda: 1.0e-4
    ds_id: [ random ]
  - type: potential
    name: potential
    lambda: {type: step, steps: 5.0e+3, start: 1.0e-5, end: 0.0 }
    ds_id: [ random ]

loss_scaling:
  - type: b_height
    name: b_height
    loss_ids: [ force_free, potential ]

callbacks:
  - type: boundary
    name: boundary-sharp
    ds_id: sharp
  - type: metrics
    name: metrics
    ds_id: cube
  - type: slices
    ds_id: slices
