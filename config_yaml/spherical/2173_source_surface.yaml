---
base_path: "/glade/work/rjarolim/nf2/spherical/2173_source_surface_v02"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/2173_source_surface_v01"
logging:
  project: spherical
  name: "2173 source surface"
data:
  type: spherical
  train_configs:
    - type: map
      ds_id: full_disk
      batch_size: 4096
      files:
        Br: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Br.fits"
        Bt: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Bt.fits"
        Bp: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Bp.fits"
        Br_err: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Br_err.fits"
        Bt_err: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Bt_err.fits"
        Bp_err: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Bp_err.fits"
      mask_configs:
        type: mu_filter
        min: 0.2
    - type: map
      ds_id: synoptic
      batch_size: 4096
      files:
        Br: "/glade/work/rjarolim/data/global/fd_2173/hmi.synoptic_mr_polfil_720s.2173.Mr_polfil.fits"
        Bt: "/glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bt.fits"
        Bp: "/glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bp.fits"
      mask_configs:
        type: reference
        file: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Br.fits"
        mu_filter:
          min: 0.2
    - type: random_radial_grouped
      ds_id: random
      batch_size: 16384
      n_lat_lon_sample: 64
      length: 1.0e+4
  validation_configs:
    - type: map
      ds_id: full_disk_valid
      filter_nans: false
      shuffle: false
      plot_overview: false
      files:
        Br: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Br.fits"
        Bt: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Bt.fits"
        Bp: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Bp.fits"
        Br_err: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Br_err.fits"
        Bt_err: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Bt_err.fits"
        Bp_err: "/glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_160000_TAI.Bp_err.fits"
      mask_configs:
        - type: mu_filter
          min: 0.2
        - type: heliographic_carrington
          longitude_range: [ 82.85, 244.83 ]
          latitude_range: [ -78.34, 65.71  ]
          invert: true
    - type: map
      ds_id: synoptic_valid
      filter_nans: false
      shuffle: false
      plot_overview: false
      files:
        Br: "/glade/work/rjarolim/data/global/fd_2173/hmi.synoptic_mr_polfil_720s.2173.Mr_polfil.fits"
        Bt: "/glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bt.fits"
        Bp: "/glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bp.fits"
    - type: spherical_slices
      ds_id: slices
      n_slices: 10
      plot_currents: true
    - type: sphere
      ds_id: sphere
  max_radius: 2.5
  G_per_dB: 100
  num_workers: 16
  batch_size: 16384

model:
  type: vector_potential
  dim: 256

training:
  epochs: 100

loss:
  - type: boundary
    name: boundary
    lambda: { start: 1.0e+3, end: 1.0, iterations: 5.0e+3 }
    ds_id: [full_disk, synoptic]
  - type: force_free
    name: force_free
    lambda: 1.0e-3
    ds_id: [ random ]
  - type: potential
    name: potential
    lambda: {type: step, steps: 5.0e+3, start: 1.0e-2, end: 0.0 }
    ds_id: [ random ]
  - type: potential
    name: potential_top
    lambda: 1.0e-3
    ds_id: [ random ]
  - type: energy_gradient
    name: energy_gradient
    lambda: { start: 1.0e-2, end: 1.0, iterations: 5.0e+3 }
    ds_id: [ random ]
  - type: radial
    name: radial
    lambda: 1.0e-2
    ds_id: [ random ]

loss_scaling:
  - type: b_height
    name: b_height
    loss_ids: [ force_free, potential, potential_top, energy_gradient ]
    power: 2.0
  - type: radial
    name: radial
    base_radius: 1.2
    max_radius: 2.5
    loss_ids: [ energy_gradient, potential_top ]
  - type: radial
    name: source_surface_radial
    base_radius: 2.0
    max_radius: 2.5
    loss_ids: [ radial ]


callbacks:
  - type: boundary
    name: boundary
    ds_id: full_disk_valid
    component_labels: [ r, t, p ]
  - type: boundary
    name: synoptic_boundary
    ds_id: synoptic_valid
    component_labels: [ r, t, p ]
  - type: metrics
    name: metrics
    ds_id: sphere
  - type: spherical_slices
    ds_id: slices
