---
base_path: "/glade/work/rjarolim/nf2/nlte/sst_tau0_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/sst_tau0_v01"
logging:
  project: NLTE
  name: "SST tau0"
data:
  type: cartesian
  train_configs:
    - type: los_trv_azi
      ds_id: ltau_-0.0
      Mm_per_pixel: 0.09
      fits_path:
        B_los: "/glade/work/rjarolim/data/nf2/nlte/BLOS_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
        B_trv: "/glade/work/rjarolim/data/nf2/nlte/BTRV_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
        B_azi: "/glade/work/rjarolim/data/nf2/nlte/BAZIPRE_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
        Z: "/glade/work/rjarolim/data/nf2/nlte/Z_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
      load_map: False
      # slice: [ 250, 900, 150, 950 ]
#      ambiguous_azimuth: True
  valid_configs:
    - type: los_trv_azi
      ds_id: ltau_-0.0
      Mm_per_pixel: 0.09
      fits_path:
        B_los: "/glade/work/rjarolim/data/nf2/nlte/BLOS_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
        B_trv: "/glade/work/rjarolim/data/nf2/nlte/BTRV_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
        B_azi: "/glade/work/rjarolim/data/nf2/nlte/BAZIPRE_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
        Z: "/glade/work/rjarolim/data/nf2/nlte/Z_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
      load_map: False
      # slice: [ 250, 900, 150, 950 ]
#      ambiguous_azimuth: True
    - type: cube
      ds_id: cube
    - type: slices
      ds_id: slices
  num_workers: 16
  iterations: 10000
  z_range: [ 0, 60 ]

model:
  type: vector_potential
  dim: 256


training:
  epochs: 20

loss:
  - type: boundary_los_trv_azi
    name: boundary
    lambda: 1.0
    ds_id: [ 'ltau_-0.0' ]
    ambiguous: True
  - type: boundary
    name: potential_boundary
    lambda: 1.0
    ds_id: potential
  - type: force_free
    name: force_free
    lambda: 1.0e-2

loss_scaling:
  - type: potential_fit
    name: potential_fit
    loss_ids: [boundary, potential_boundary, force_free]
    ref_file: "/glade/work/rjarolim/data/nf2/nlte/BLOS_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
    Mm_per_pixel: 0.09

callbacks:
  # Boundary callbacks
  - type: los_trv_azi_boundary
    name: boundary-0.0
    ds_id: ltau_-0.0
  # Cube evaluation
  - type: metrics
    name: metrics
    ds_id: cube
  - type: slices
    ds_id: slices