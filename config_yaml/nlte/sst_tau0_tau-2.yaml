---
base_path: "/glade/work/rjarolim/nf2/nlte/sst_tau0_tau-2_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/sst_tau0_tau-2_v01"
logging:
  project: NLTE
  name: "SST - NLTE - tau: 0,-2"
data:
  type: cartesian
  train_configs:
    - type: los_trv_azi
      ds_id: ltau_-0.0
      Mm_per_pixel: 0.09
      fits_path:
        B_los: "/glade/work/rjarolim/data/nf2/nlte/BLOS_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
        B_trv: "/glade/work/rjarolim/data/nf2/nlte/BTRV_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
        B_azi: "/glade/work/rjarolim/data/nf2/nlte/BAZIPRE_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
        Z: "/glade/work/rjarolim/data/nf2/nlte/Z_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
      load_map: False
      # slice: [ 250, 900, 150, 950 ]
    - type: los_trv_azi
      ds_id: ltau_-2.0
      Mm_per_pixel: 0.09
      fits_path:
        B_los: "/glade/work/rjarolim/data/nf2/nlte/BLOS_2018-09-30T09:22:00_NLTE_ltau_-2.0.fits"
        B_trv: "/glade/work/rjarolim/data/nf2/nlte/BTRV_2018-09-30T09:22:00_NLTE_ltau_-2.0.fits"
        B_azi: "/glade/work/rjarolim/data/nf2/nlte/BAZIPRE_2018-09-30T09:22:00_NLTE_ltau_-2.0.fits"
        Z: "/glade/work/rjarolim/data/nf2/nlte/Z_2018-09-30T09:22:00_NLTE_ltau_-2.0.fits"
      mask_config: { path: "/glade/work/rjarolim/data/nf2/nlte/mask.fits" }
      load_map: False
      # slice: [ 250, 900, 150, 950 ]
  valid_configs:
    - type: los_trv_azi
      ds_id: ltau_-0.0
      Mm_per_pixel: 0.09
      fits_path:
        B_los: "/glade/work/rjarolim/data/nf2/nlte/BLOS_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
        B_trv: "/glade/work/rjarolim/data/nf2/nlte/BTRV_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
        B_azi: "/glade/work/rjarolim/data/nf2/nlte/BAZIPRE_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
        Z: "/glade/work/rjarolim/data/nf2/nlte/Z_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
      load_map: False
      # slice: [ 250, 900, 150, 950 ]
    - type: los_trv_azi
      ds_id: ltau_-2.0
      Mm_per_pixel: 0.09
      fits_path:
        B_los: "/glade/work/rjarolim/data/nf2/nlte/BLOS_2018-09-30T09:22:00_NLTE_ltau_-2.0.fits"
        B_trv: "/glade/work/rjarolim/data/nf2/nlte/BTRV_2018-09-30T09:22:00_NLTE_ltau_-2.0.fits"
        B_azi: "/glade/work/rjarolim/data/nf2/nlte/BAZIPRE_2018-09-30T09:22:00_NLTE_ltau_-2.0.fits"
        Z: "/glade/work/rjarolim/data/nf2/nlte/Z_2018-09-30T09:22:00_NLTE_ltau_-2.0.fits"
      mask_config: { path: "/glade/work/rjarolim/data/nf2/nlte/mask.fits" }
      load_map: False
      # slice: [ 250, 900, 150, 950 ]
    - type: cube
      ds_id: cube
    - type: slices
      ds_id: slices
  num_workers: 16
  iterations: 10000
  z_range: [ 0, 50 ]

model:
  type: vector_potential
  dim: 256

training:
  epochs: 20

loss:
  - type: boundary_los_trv_azi
    name: bottom
    lambda: 1.0
    ds_id: [ 'ltau_-0.0' ]
    ambiguous: True
  - type: boundary_los_trv_azi
    name: internal
    lambda: {start: 1.0e-4, end: 1.0, iterations: 10000}
    ds_id: [ 'ltau_-2.0' ]
    ambiguous: True
  - type: boundary
    name: potential_boundary
    lambda: 1.0
    ds_id: potential
  - type: force_free
    name: force_free
    lambda: 1.0e-3
  - type: height
    name: height
    lambda: 1.0e-2
    ds_id: [ 'ltau_-2.0' ]

transforms:
  - type: nlte_height
    height_range: [ 0, 5 ]
    ds_id: [ 'ltau_-2.0' ]

loss_scaling:
  - type: potential_fit
    name: potential_fit
    loss_ids: [bottom, internal, potential_boundary, force_free]
    ref_file: "/glade/work/rjarolim/data/nf2/nlte/BLOS_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits"
    Mm_per_pixel: 0.09

callbacks:
  # Boundary callbacks
  - type: los_trv_azi_boundary
    name: boundary-0.0
    ds_id: ltau_-0.0
  - type: los_trv_azi_boundary
    name: boundary-2.0
    ds_id: ltau_-2.0
  # Cube evaluation
  - type: metrics
    name: metrics
    ds_id: cube
  - type: slices
    ds_id: slices