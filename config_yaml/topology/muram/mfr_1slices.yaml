---
base_path: "/glade/work/rjarolim/nf2/topology/muram_mfr_1slices_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/muram_mfr_1slices_v01"
logging:
  project: topology
  name: MURAM MFR - tau1
data:
  type: cartesian
  train_configs:
    - type: muram_slice
      ds_id: tau_1.0
      data_path: "/glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_B/2D/tau_slice_1.000.474000"
      los_trv_azi_transform: True
  valid_configs:
    - type: muram_slice
      ds_id: tau_1.0
      data_path: "/glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_B/2D/tau_slice_1.000.474000"
      los_trv_azi_transform: True
    - type: cube
      ds_id: cube
    - type: slices
      ds_id: slices
  num_workers: 8
  iterations: 10000
  batch_size: 8192
  random_config:
    batch_size: 16384
  z_range: [ 0, 50 ]
  boundary_config:
    type: potential
    batch_size: 1024
model:
  type: vector_potential
  dim: 256
training:
  epochs: 15

loss:
  - type: boundary_los_trv_azi
    name: boundary
    lambda: 1.0
    ds_id: tau_1.0
  - type: boundary
    name: potential_boundary
    lambda: 1.0e+1
    ds_id: potential
  - type: force_free
    lambda: 1.0e-3
  - type: potential
    lambda: 1.0e-4

callbacks:
  - type: los_trv_azi_boundary
    name: boundary-tau_1.0
    ds_id: tau_1.0
  - type: metrics
    name: metrics-tau_1.0
    ds_id: cube
  - type: slices
    ds_id: slices