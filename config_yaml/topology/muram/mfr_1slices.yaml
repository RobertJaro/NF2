---
base_path: "/glade/work/rjarolim/nf2/topology/muram_mfr_1slices_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/muram_mfr_1slices_v01"
logging:
  project: topology
  name: MURAM MFR - tau1
data:
  type: cartesian
  train_configs:
    - type: muram_slice
      ds_id: tau_1.0
      data_path: "/glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_B/2D/tau_slice_1.000.474000"
      los_trv_azi_transform: True
      ambiguous_azimuth: False
  random_config: { type: height }
  num_workers: 16
  iterations: 10000
  z_range: [ 0, 50 ]

model:
  type: vector_potential
  dim: 256
  encoding_config: { type: gaussian }

training:
  epochs: 30

loss:
  - type: boundary_los_trv_azi
    name: boundary
    lambda: 1.0
    ds_id: tau_1.0
    ambiguous: False
  - type: boundary
    name: potential_boundary
    lambda: 1.0e+1
    ds_id: potential
  - type: force_free
    name: force_free
    lambda: 1.0e-4
    ds_id: [ random ]
  - type: potential
    name: potential
    lambda: {type: step, steps: 5.0e+3, start: 1.0e-5, end: 0.0 }
    ds_id: [ random ]

loss_scaling:
  - type: b_height
    name: b_height
    loss_ids: [ force_free, potential ]

callbacks:
  # Boundary callbacks
  - type: los_trv_azi_boundary
    name: boundary-tau_1.0
    ds_id: tau_1.0
  # Cube evaluation
  - type: metrics
    name: metrics-tau_1.0
    ds_id: cube
  - type: slices
    ds_id: slices