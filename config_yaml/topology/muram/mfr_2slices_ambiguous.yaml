---
base_path: "/glade/work/rjarolim/nf2/topology/muram_mfr_2slices_ambiguous_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/muram_mfr_2slices_ambiguous_v01"
logging:
  project: topology
  name: MURAM MFR - tau1 + tau1e-4 - ambiguous
data:
  type: cartesian
  train_configs:
    - type: muram_slice
      ds_id: tau_1.0
      data_path: "/glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_B/2D/tau_slice_1.000.474000"
      los_trv_azi_transform: True
      ambiguous_azimuth: True
    - type: muram_slice
      ds_id: tau_1.0e-4
      data_path: "/glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_B/2D/tau_slice_0.000100.474000"
      height_mapping: { z: 0.6, z_min: 0, z_max: 5 }
      los_trv_azi_transform: True
      ambiguous_azimuth: True
  num_workers: 8
  iterations: 1000
  z_range: [ 0, 50 ]

model:
  type: vector_potential
  dim: 256

training:
  epochs: 100

loss:
  - type: boundary_los_trv_azi
    name: bottom
    lambda: 1.0
    ds_id: [ tau_1.0 ]
    ambiguous: True
  - type: boundary_los_trv_azi
    name: internal
    lambda: 1.0
    ds_id: [ tau_1.0e-4 ]
    ambiguous: True
  - type: boundary
    name: potential_boundary
    lambda: 1.0
    ds_id: potential
  - type: force_free
    lambda: 1.0e-3
  - type: height
    name: height
    lambda: 1.0e-4
    ds_id: [ tau_1.0e-4 ]

transforms:
  - type: nlte_height
    height_range: [ 0, 20 ]
    ds_id: [ tau_1.0e-4 ]

loss_scaling:
  - type: potential_fit
    name: potential_fit
    loss_ids: [bottom, internal, potential_boundary, force_free]
    ref_file: "/glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_B/2D/tau_slice_1.000.474000"
    Mm_per_pixel: 0.192

callbacks:
    # Boundary callbacks
  - type: los_trv_azi_boundary
    name: boundary-tau_1.0
    ds_id: tau_1.0
  - type: los_trv_azi_boundary
    name: boundary-tau_1.0e-4
    ds_id: tau_1.0e-4
  # Cube evaluation
  - type: metrics
    name: metrics-tau_1.0
    ds_id: cube
  - type: slices
    ds_id: slices