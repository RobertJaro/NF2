---
base_path: "/glade/work/rjarolim/nf2/topology/muram_sma_2slices_ambiguous_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/muram_sma_2slices_ambiguous_v01"
logging:
  project: topology
  name: MURAM SMA - tau1 + tau1e-6 - ambiguous
data:
  type: cartesian
  train_configs:
    - type: muram_slice
      ds_id: tau_1.0
      data_path: "/glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_A/2D/tau_slice_1.000.399000"
      los_trv_azi_transform: True
      ambiguous_azimuth: True
    - type: muram_slice
      ds_id: tau_1.0e-6
      data_path: "/glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_A/2D/tau_slice_0.000001.399000"
      height_mapping: { z: 2.0 }
      los_trv_azi_transform: True
      ambiguous_azimuth: True
  random_config: { type: height }
  num_workers: 8
  iterations: 10000
  z_range: [ 0, 50 ]

model:
  type: vector_potential
  dim: 256
  encoding_config: { type: gaussian }

training:
  epochs: 30

loss:
  - type: boundary_los_trv_azi
    name: boundary
    lambda: 1.0
    ds_id: [ tau_1.0, tau_1.0e-6 ]
    ambiguous: True
  - type: boundary
    name: potential_boundary
    lambda: 1.0e+1
    ds_id: potential
  - type: force_free
    name: force_free
    lambda: 1.0e-4
    ds_id: [ random ]
  - type: height
    name: height
    lambda: 1.0e-4
    ds_id: [ tau_1.0e-6 ]

transforms:
  - type: height
    height_range: [ 0, 20 ]
    ds_id: [ tau_1.0e-6 ]

loss_scaling:
  - type: b_height
    name: b_height
    loss_ids: [ force_free ]

callbacks:
  # Boundary callbacks
  - type: los_trv_azi_boundary
    name: boundary-tau_1.0
    ds_id: tau_1.0
  - type: los_trv_azi_boundary
    name: boundary-tau_1.0e-6
    ds_id: tau_1.0e-6
  # Cube evaluation
  - type: metrics
    name: metrics-tau_1.0
    ds_id: cube
  - type: slices
    ds_id: slices