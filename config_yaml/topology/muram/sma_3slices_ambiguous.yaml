---
base_path: "/glade/work/rjarolim/nf2/topology/muram_sma_3slices_ambiguous_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/muram_sma_3slices_ambiguous_v01"
logging:
  project: topology
  name: MURAM SMA - tau1 + tau1e-4 + tau1e-6 - ambiguous
data:
  type: cartesian
  train_configs:
    - type: muram_slice
      ds_id: tau_1.0
      data_path: "/gpfs/gpfs0/robert.jarolim/data/nf2/muram_sma/tau_slice_1.000.399000"
      los_trv_azi_transform: True
      ambiguous_azimuth: True
    - type: muram_slice
      ds_id: tau_1.0e-4
      data_path: "/gpfs/gpfs0/robert.jarolim/data/nf2/muram_sma/tau_slice_0.000100.399000"
      height_mapping: { z: 0.6, z_min: 0, z_max: 5 }
      los_trv_azi_transform: True
      ambiguous_azimuth: True
    - type: muram_slice
      ds_id: tau_1.0e-6
      data_path: "/gpfs/gpfs0/robert.jarolim/data/nf2/muram_sma/tau_slice_0.000001.399000"
      height_mapping: { z: 2.0, z_min: 0, z_max: 8 }
      los_trv_azi_transform: True
      ambiguous_azimuth: True
  num_workers: 8
  iterations: 10000
  batch_size: 4096
  random_config:
    batch_size: 16384
  z_range: [ 0, 50 ]
  boundary_config:
    type: potential
    batch_size: 1024
model:
  type: gauged_vector_potential
  dim: 256
training:
  epochs: 10

loss:
  - type: boundary_los_trv_azi
    name: boundary
    lambda: 1.0
    ds_id: [ tau_1.0, tau_1.0e-4, tau_1.0e-6 ]
  - type: boundary
    name: potential_boundary
    lambda: 1.0e+1
    ds_id: potential
  - type: force_free
    lambda: 1.0e-2
  - type: azimuth_disambiguation
    name: disambiguation
    lambda: { start: 1.0, end: 1.0e-2, iterations: 1.0e+5 }
    ds_id: [ tau_1.0, tau_1.0e-4, tau_1.0e-6 ]
  - type: height
    name: height
    lambda: 1.0e-4
    ds_id: [ tau_1.0e-4, tau_1.0e-6 ]

transforms:
  - type: azimuth
    ds_id: [ tau_1.0, tau_1.0e-4, tau_1.0e-6 ]
  - type: height
    ds_id: [ tau_1.0e-4, tau_1.0e-6 ]

callbacks:
    # Disambiguation callbacks
  - type: disambiguation
    name: disambiguation-tau_1.0
    ds_id: tau_1.0
  - type: disambiguation
    name: disambiguation-tau_1.0e-4
    ds_id: tau_1.0e-4
  - type: disambiguation
    name: disambiguation-tau_1.0e-6
    ds_id: tau_1.0e-6
    # Boundary callbacks
  - type: los_trv_azi_boundary
    name: boundary-tau_1.0
    ds_id: tau_1.0
  - type: los_trv_azi_boundary
    name: boundary-tau_1.0e-4
    ds_id: tau_1.0e-4
  - type: los_trv_azi_boundary
    name: boundary-tau_1.0e-6
    ds_id: tau_1.0e-6
  # Cube evaluation
  - type: metrics
    name: metrics-tau_1.0
    ds_id: cube
  - type: slices
    ds_id: slices