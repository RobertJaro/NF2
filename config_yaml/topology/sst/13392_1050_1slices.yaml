---
base_path: "/glade/work/rjarolim/nf2/topology/13392_1050_1slices_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/13392_1050_1slices_v01"
logging:
  project: topology
  name: "13392 SST 10:50 - 6173"
data:
  type: cartesian
  train_configs:
    - type: los_trv_azi
      ds_id: 6173
      Mm_per_pixel: 0.09
      fits_path:
        B_los: "/glade/work/rjarolim/data/SST/campaign_2023_1050_converted/BLOS_panorama1050_6173_StkIQUV_rebin.fits"
        B_trv: "/glade/work/rjarolim/data/SST/campaign_2023_1050_converted/BTRV_panorama1050_6173_StkIQUV_rebin.fits"
        B_azi: "/glade/work/rjarolim/data/SST/campaign_2023_1050_converted/BAZI_panorama1050_6173_StkIQUV_rebin.fits"
      mask_path: "/glade/work/rjarolim/data/SST/campaign_2023_1050_converted/mask.fits"
      load_map: False
      ambiguous_azimuth: True
  random_config: { type: height }
  num_workers: 8
  iterations: 10000
  z_range: [ 0, 50 ]

model:
  type: vector_potential
  dim: 256
  encoding_config: { type: gaussian }

training:
  epochs: 30

loss:
  - type: boundary_los_trv_azi
    name: boundary
    lambda: 1.0
    ds_id: [ 6173 ]
    ambiguous: True
  - type: boundary
    name: potential_boundary
    lambda: 1.0e+1
    ds_id: potential
  - type: force_free
    name: force_free
    lambda: 1.0e-4
    ds_id: [ random ]

loss_scaling:
  - type: b_height
    name: b_height
    loss_ids: [ force_free ]

callbacks:
  # Boundary callbacks
  - type: los_trv_azi_boundary
    name: boundary-6173
    ds_id: 6173
  # Cube evaluation
  - type: metrics
    name: metrics
    ds_id: cube
  - type: slices
    ds_id: slices