work_directory: "/glade/derecho/scratch/rjarolim/nf2/13392_0851_3slices_v01"
logging:
  project: topology
  name: "13392 SST 08:51 - - 6173+7699+8542"
data:
  type: cartesian
  train_configs:
    - type: los_trv_azi
      ds_id: 6173
      Mm_per_pixel: 0.09
      fits_path:
        B_los: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BLOS_panorama0851_6173_StkIQUV_rebin.fits"
        B_trv: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BTRV_panorama0851_6173_StkIQUV_rebin.fits"
        B_azi: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BAZI_panorama0851_6173_StkIQUV_rebin.fits"
      mask_config: { path: "/glade/work/rjarolim/data/SST/campaign_2023_v2/mask.fits", value: 0.0 }
      load_map: False
      ambiguous_azimuth: True
    - type: los_trv_azi
      ds_id: 7699
      Mm_per_pixel: 0.09
      fits_path:
        B_los: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BLOS_panorama0851_7699_StkIQUV_rebin_v2.fits"
        B_trv: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BTRV_panorama0851_7699_StkIQUV_rebin_v2.fits"
        B_azi: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BAZI_panorama0851_7699_StkIQUV_rebin_v2.fits"
      mask_config: { path: "/glade/work/rjarolim/data/SST/campaign_2023_v2/mask.fits" }
      height:
        z: 0.5
      load_map: False
      ambiguous_azimuth: True
    - type: los_trv_azi
      ds_id: 8542
      Mm_per_pixel: 0.09
      fits_path:
        B_los: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BLOS_panorama0851_8542_StkIQUV_rebin.fits"
        B_trv: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BTRV_panorama0851_8542_StkIQUV_rebin.fits"
        B_azi: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BAZI_panorama0851_8542_StkIQUV_rebin.fits"
      mask_config: { path: "/glade/work/rjarolim/data/SST/campaign_2023_v2/mask.fits" }
      height_mapping: { z: 2.0 }
      load_map: False
      ambiguous_azimuth: True
  random_config: { type: height }
  num_workers: 16
  iterations: 10000
  z_range: [ 0, 50 ]

model:
  type: vector_potential
  dim: 256
  encoding_config: { type: gaussian }

training:
  epochs: 30

loss:
  - type: boundary_los_trv_azi
    name: boundary
    lambda: 1.0
    ds_id: [ 6173, 7699, 8542 ]
    ambiguous: True
  - type: boundary
    name: potential_boundary
    lambda: 1.0e+1
    ds_id: potential
  - type: force_free
    name: force_free
    lambda: 1.0e-4
    ds_id: [ random ]
  - type: potential
    name: potential
    lambda: { type: step, steps: 5.0e+3, start: 1.0e-5, end: 0.0 }
    ds_id: [ random ]
  - type: height
    name: height
    lambda: 1.0e-5
    ds_id: [ 7699, 8542 ]

transforms:
  - type: height
    height_range: [ 0, 20 ]
    ds_id: [ 7699, 8542 ]

loss_scaling:
  - type: b_height
    name: b_height
    loss_ids: [ force_free, potential ]

callbacks:
  # Boundary callbacks
  - type: los_trv_azi_boundary
    name: boundary-6173
    ds_id: 6173
  - type: los_trv_azi_boundary
    name: boundary-7699
    ds_id: 7699
  - type: los_trv_azi_boundary
    name: boundary-8542
    ds_id: 8542
  # Cube evaluation
  - type: metrics
    name: metrics
    ds_id: cube
  - type: slices
    ds_id: slices