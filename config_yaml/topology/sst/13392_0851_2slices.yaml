work_directory: "/glade/derecho/scratch/rjarolim/nf2/13392_0851_2slices_v02"
logging:
  project: topology
  name: "13392 SST 08:51 - - 6173+8542"
data:
  type: cartesian
  train_configs:
    - type: los_trv_azi
      ds_id: 6173
      Mm_per_pixel: 0.09
      fits_path:
        B_los: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BLOS_panorama0851_6173_StkIQUV_rebin.fits"
        B_trv: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BTRV_panorama0851_6173_StkIQUV_rebin.fits"
        B_azi: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BAZI_panorama0851_6173_StkIQUV_rebin.fits"
      mask_path: "/glade/work/rjarolim/data/SST/campaign_2023_v2/mask.fits"
      load_map: False
      ambiguous_azimuth: True
    - type: los_trv_azi
      ds_id: 8542
      Mm_per_pixel: 0.09
      fits_path:
        B_los: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BLOS_panorama0851_8542_StkIQUV_rebin.fits"
        B_trv: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BTRV_panorama0851_8542_StkIQUV_rebin.fits"
        B_azi: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BAZI_panorama0851_8542_StkIQUV_rebin.fits"
      mask_path: "/glade/work/rjarolim/data/SST/campaign_2023_v2/mask.fits"
      height_mapping: { z: 2.0, z_min: 0, z_max: 20 }
      load_map: False
      ambiguous_azimuth: True
  num_workers: 8
  iterations: 1000

model:
  type: vector_potential
  dim: 256

training:
  epochs: 100

loss:
  - type: boundary_los_trv_azi
    name: boundary
    lambda: 1.0
    ds_id: [ 6173, 8542 ]
    ambiguous: True
  - type: boundary
    name: potential_boundary
    lambda: 1.0
    ds_id: potential
  - type: force_free
    name: force_free
    lambda: 1.0e-2
  - type: height
    name: height
    lambda: 1.0e-3
    ds_id: [ 8542 ]

transforms:
  - type: nlte_height
    height_range: [ 0, 20 ]
    ds_id: [ 8542 ]

loss_scaling:
  - type: potential_fit
    name: potential_fit
    loss_ids: [boundary, potential_boundary, force_free]
    ref_file: "/glade/work/rjarolim/data/SST/campaign_2023_v2/BLOS_panorama0851_6173_StkIQUV_rebin.fits"
    Mm_per_pixel: 0.09

callbacks:
    # Boundary callbacks
  - type: los_trv_azi_boundary
    name: boundary-6173
    ds_id: 6173
  - type: los_trv_azi_boundary
    name: boundary-8542
    ds_id: 8542
  # Cube evaluation
  - type: metrics
    name: metrics
    ds_id: cube
  - type: slices
    ds_id: slices