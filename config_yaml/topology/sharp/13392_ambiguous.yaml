---
base_path: "/glade/work/rjarolim/nf2/topology/sharp_13392_ambiguous_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/sharp_13392_ambiguous_v01"
logging:
  project: topology
  name: "13392 SHARP 09:12 - ambiguous"
data:
  type: cartesian
  train_configs:
    - type: fld_inc_azi
      ds_id: 9875
      fits_path:
        B_fld: "/glade/work/rjarolim/data/nf2/13392/hmi.sharp_720s.9875.20230806_091200_TAI.field.fits"
        B_inc: "/glade/work/rjarolim/data/nf2/13392/hmi.sharp_720s.9875.20230806_091200_TAI.inclination.fits"
        B_azi: "/glade/work/rjarolim/data/nf2/13392/hmi.sharp_720s.9875.20230806_091200_TAI.azimuth.fits"
#        B_amb: "/glade/work/rjarolim/data/nf2/13392/hmi.sharp_720s.9875.20230806_091200_TAI.disambig.fits"
      ambiguous_azimuth: True
      slice: [ 380, 840, 0, 1000 ]
  random_config: { type: height }
  num_workers: 8
  iterations: 10000
  z_range: [ 0, 50 ]

model:
  type: vector_potential
  dim: 256
  encoding_config: { type: gaussian }

training:
  epochs: 30

loss:
  - type: boundary_los_trv_azi
    name: boundary
    lambda: 1.0
    ds_id: [ 9875 ]
    ambiguous: True
  - type: boundary
    name: potential_boundary
    lambda: 1.0e+1
    ds_id: potential
  - type: force_free
    name: force_free
    lambda: 1.0e-4
    ds_id: [ random ]

loss_scaling:
  - type: b_height
    name: b_height
    loss_ids: [ force_free ]

callbacks:
  # Boundary callbacks
  - type: los_trv_azi_boundary
    name: boundary-9875
    ds_id: 9875
  # Cube evaluation
  - type: metrics
    name: metrics
    ds_id: cube
  - type: slices
    ds_id: slices