---
base_path: "/glade/work/rjarolim/nf2/muram_example/series_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/series_v01"
meta_path: "/glade/work/rjarolim/nf2/muram_example/x_flare_v01/last.ckpt"

logging:
  project: NF2-MURAM
  name: X Flare - series - v01

data:
  type: cartesian
  train_configs:
    - type: muram_slice
      ds_id: tau_0.1
      data_path: "/glade/campaign/hao/radmhd/rjarolim/MURAM_X_flare/data_closed/tau_slice_0.100.*"
  num_workers: 8
  iterations: 5.0e+3
  batch_size: 8192
  random_config:
    batch_size: 16384
  z_range: [ 0, 100 ]
  boundary_config:
    type: potential
    batch_size: 1024
    strides: 4

model:
  type: gauged_vector_potential
  dim: 256

training:
  check_val_every_n_epoch: 5

loss:
  - type: boundary
    name: boundary
    lambda: 1.0
    ds_id: tau_0.1
  - type: boundary
    name: potential_boundary
    lambda: 1.0e+1
    ds_id: potential
  - type: force_free
    lambda: 1.0e-2

callbacks:
  - type: boundary
    name: boundary-tau_0.1
    ds_id: tau_0.1
  - type: metrics
    name: metrics
    ds_id: cube
  - type: slices
    ds_id: slices