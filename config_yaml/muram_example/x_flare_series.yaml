---
base_path: "/glade/work/rjarolim/nf2/muram_example/series_v01"
work_directory: "/glade/derecho/scratch/rjarolim/nf2/series_v01"
meta_path: "/glade/work/rjarolim/nf2/muram_example/x_flare_v01/last.ckpt"

logging:
  project: NF2-MURAM
  name: X Flare - series - v01

data:
  type: cartesian
  train_configs:
    - type: muram_slice
      ds_id: tau_0.1
      data_path: "/glade/campaign/hao/radmhd/rjarolim/MURAM_X_flare/data_open/tau_slice_0.100.*"
  random_config: { type: height }
  num_workers: 16
  iterations: 2000
  z_range: [ 0, 100 ]


model:
  type: vector_potential
  dim: 256
  encoding_config: { type: gaussian }

training:
  check_val_every_n_epoch: 5

loss:
  - type: boundary
    name: boundary
    lambda: 1.0
    ds_id: tau_0.1
  - type: boundary
    name: potential_boundary
    lambda: 1.0e+1
    ds_id: potential
  - type: force_free
    name: force_free
    lambda: 1.0e-4
    ds_id: [ random ]

loss_scaling:
  - type: b_height
    name: b_height
    loss_ids: [ force_free ]

callbacks:
  - type: boundary
    name: boundary-tau_0.1
    ds_id: tau_0.1
  - type: metrics
    name: metrics
    ds_id: cube
  - type: slices
    ds_id: slices