run:
  mode: single
  geometry: cartesian
  output_dir: /glade/work/rjarolim/nf2/scaling/11515_v01
  work_dir: /glade/derecho/scratch/rjarolim/nf2/11515_v01
logging:
  project: nf2-cartesian
  name: 11515 - SIREN
data:
  parameters:
    num_workers: 8
    iterations: 1000
    batch_size: 16384
  train:
  - type: fits
    ds_id: SHARP
    fits_path:
      Br: /glade/work/rjarolim/data/nf2/11515/hmi.sharp_cea_720s.1807.20120704_140000_TAI.Br.fits
      Bt: /glade/work/rjarolim/data/nf2/11515/hmi.sharp_cea_720s.1807.20120704_140000_TAI.Bt.fits
      Bp: /glade/work/rjarolim/data/nf2/11515/hmi.sharp_cea_720s.1807.20120704_140000_TAI.Bp.fits
    error_path:
      Br_err: /glade/work/rjarolim/data/nf2/11515/hmi.sharp_cea_720s.1807.20120704_140000_TAI.Br_err.fits
      Bt_err: /glade/work/rjarolim/data/nf2/11515/hmi.sharp_cea_720s.1807.20120704_140000_TAI.Bt_err.fits
      Bp_err: /glade/work/rjarolim/data/nf2/11515/hmi.sharp_cea_720s.1807.20120704_140000_TAI.Bp_err.fits
  validation: []
model:
  type: vector_potential
  dim: 256
  w0_initial: 30
training:
  epochs: 10
losses:
- type: boundary
  name: boundary
  lambda: 1.0
  ds_id:
  - SHARP
- type: boundary
  name: potential_boundary
  lambda: 1.0
  ds_id:
  - potential
- type: force_free
  lambda: 0.001
callbacks:
- type: boundary
  name: boundary
  ds_id: SHARP
- type: metrics
  name: metrics
  ds_id: cube
- type: slices
  ds_id: slices
loss_scaling:
- type: exponential
  name: exponential_scaling
  loss_ids:
  - boundary
  - potential_boundary
  - force_free
