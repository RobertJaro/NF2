run:
  mode: single
  geometry: cartesian
  output_dir: /glade/work/rjarolim/nf2/nlte/hmi_v03
  work_dir: /glade/derecho/scratch/rjarolim/nf2/hmi_v03
logging:
  project: NLTE
  name: HMI
data:
  parameters:
    num_workers: 16
    iterations: 10000
    z_range:
    - 0
    - 60
  train:
  - type: fld_inc_azi
    ds_id: SHARP
    fits_path:
      B_fld: /glade/work/rjarolim/data/nf2/12723/hmi.sharp_720s.7310.20180930_092400_TAI.field.fits
      B_inc: /glade/work/rjarolim/data/nf2/12723/hmi.sharp_720s.7310.20180930_092400_TAI.inclination.fits
      B_azi: /glade/work/rjarolim/data/nf2/12723/hmi.sharp_720s.7310.20180930_092400_TAI.azimuth.fits
  validation: []
model:
  type: gauged_vector_potential
  dim: 256
training:
  epochs: 30
losses:
- type: boundary_los_trv_azi
  name: boundary
  lambda: 1.0
  ds_id:
  - SHARP
  ambiguous: true
- type: boundary
  name: potential_boundary
  lambda: 1.0
  ds_id: potential
- type: force_free
  name: force_free
  lambda: 0.01
callbacks:
- type: los_trv_azi_boundary
  name: boundary
  ds_id: SHARP
- type: metrics
  name: metrics
  ds_id: cube
- type: slices
  ds_id: slices
loss_scaling:
- type: potential_fit
  name: potential_fit
  loss_ids:
  - boundary
  - potential_boundary
  - force_free
  ref_file: /glade/work/rjarolim/data/nf2/12723/hmi.sharp_cea_720s.7310.20180930_092400_TAI.Br.fits
  Mm_per_pixel: 0.36
  power: 2.0
