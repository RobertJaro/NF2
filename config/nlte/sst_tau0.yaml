run:
  mode: single
  geometry: cartesian
  output_dir: /glade/work/rjarolim/nf2/nlte/sst_tau0_v01
  work_dir: /glade/derecho/scratch/rjarolim/nf2/sst_tau0_v01
logging:
  project: NLTE
  name: SST tau0
data:
  parameters:
    random_config:
      type: height
    num_workers: 16
    iterations: 10000
    z_range:
    - 0
    - 40
  train:
  - type: los_trv_azi
    ds_id: ltau_-0.0
    Mm_per_pixel: 0.09
    fits_path:
      B_los: /glade/work/rjarolim/data/nf2/nlte/BLOS_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits
      B_trv: /glade/work/rjarolim/data/nf2/nlte/BTRV_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits
      B_azi: /glade/work/rjarolim/data/nf2/nlte/BAZI_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits
      Z: /glade/work/rjarolim/data/nf2/nlte/Z_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits
    load_map: false
    slice:
    - 250
    - 900
    - 150
    - 950
    ambiguous_azimuth: true
  validation:
  - type: los_trv_azi
    ds_id: ltau_-0.0
    Mm_per_pixel: 0.09
    fits_path:
      B_los: /glade/work/rjarolim/data/nf2/nlte/BLOS_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits
      B_trv: /glade/work/rjarolim/data/nf2/nlte/BTRV_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits
      B_azi: /glade/work/rjarolim/data/nf2/nlte/BAZI_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits
      Z: /glade/work/rjarolim/data/nf2/nlte/Z_2018-09-30T09:22:00_NLTE_ltau_-0.0.fits
    load_map: false
    slice:
    - 250
    - 900
    - 150
    - 950
    ambiguous_azimuth: true
  - type: cube
    ds_id: cube
  - type: slices
    ds_id: slices
model:
  type: vector_potential
  dim: 256
  encoding_config:
    type: gaussian
training:
  epochs: 100
losses:
- type: boundary_los_trv_azi
  name: bottom
  lambda: 1.0
  ds_id:
  - ltau_-0.0
  ambiguous: true
- type: boundary
  name: potential_boundary
  lambda: 1.0
  ds_id: potential
- type: force_free
  name: force_free
  lambda: 0.0001
  ds_id:
  - random
callbacks:
- type: los_trv_azi_boundary
  name: boundary-0.0
  ds_id: ltau_-0.0
- type: metrics
  name: metrics
  ds_id: cube
- type: slices
  ds_id: slices
loss_scaling:
- type: b_height
  name: b_height
  loss_ids:
  - force_free
