run:
  mode: single
  geometry: cartesian
  output_dir: /glade/work/rjarolim/nf2/topology/sharp_13392_cea_v01
  work_dir: /glade/derecho/scratch/rjarolim/nf2/sharp_13392_cea_v01
logging:
  project: topology
  name: 13392 SHARP CEA 09:12
data:
  parameters:
    random_config:
      type: height
    num_workers: 16
    iterations: 10000
    z_range:
    - 0
    - 50
  train:
  - type: sharp
    ds_id: sharp
    fits_path:
      Br: /glade/work/rjarolim/data/nf2/13392/hmi.sharp_cea_720s.9875.20230806_091200_TAI.Br.fits
      Bt: /glade/work/rjarolim/data/nf2/13392/hmi.sharp_cea_720s.9875.20230806_091200_TAI.Bt.fits
      Bp: /glade/work/rjarolim/data/nf2/13392/hmi.sharp_cea_720s.9875.20230806_091200_TAI.Bp.fits
    slice:
    - 430
    - 900
    - 0
    - 1000
  validation: []
model:
  type: vector_potential
  dim: 256
  encoding_config:
    type: gaussian
training:
  epochs: 30
losses:
- type: boundary
  name: boundary
  lambda: 1.0
  ds_id: sharp
- type: boundary
  name: potential_boundary
  lambda: 10.0
  ds_id: potential
- type: force_free
  name: force_free
  lambda: 0.0001
  ds_id:
  - random
- type: potential
  name: potential
  lambda:
    type: step
    steps: 5000.0
    start: 1.0e-05
    end: 0.0
  ds_id:
  - random
callbacks:
- type: boundary
  name: boundary-sharp
  ds_id: sharp
- type: metrics
  name: metrics
  ds_id: cube
- type: slices
  ds_id: slices
loss_scaling:
- type: b_height
  name: b_height
  loss_ids:
  - force_free
  - potential
