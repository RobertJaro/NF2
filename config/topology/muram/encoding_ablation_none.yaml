run:
  mode: single
  geometry: cartesian
  output_dir: /glade/work/rjarolim/nf2/topology/encoding_ablation/encoding_none_v01
  work_dir: /glade/derecho/scratch/rjarolim/nf2/encoding_none_v01
logging:
  project: topology-ablation
  name: Encoding - scale none
data:
  parameters:
    random_config:
      type: height
    num_workers: 16
    iterations: 10000
    z_range:
    - 0
    - 50
  train:
  - type: muram_slice
    ds_id: tau_1.0
    data_path: /glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_B/2D/tau_slice_1.000.474000
    los_trv_azi_transform: true
    ambiguous_azimuth: false
  - type: muram_slice
    ds_id: tau_1.0e-6
    data_path: /glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_B/2D/tau_slice_0.000001.474000
    height_mapping:
      z: 2.0
    los_trv_azi_transform: true
    ambiguous_azimuth: false
  validation: []
model:
  type: vector_potential
  dim: 256
  encoding_config:
    type: none
training:
  epochs: 30
losses:
- type: boundary_los_trv_azi
  name: boundary
  lambda: 1.0
  ds_id:
  - tau_1.0
  - tau_1.0e-6
  ambiguous: true
- type: boundary
  name: potential_boundary
  lambda: 10.0
  ds_id: potential
- type: force_free
  name: force_free
  lambda: 0.0001
  ds_id:
  - random
- type: potential
  name: potential
  lambda:
    type: step
    steps: 5000.0
    start: 1.0e-05
    end: 0.0
  ds_id:
  - random
- type: height
  name: height
  lambda: 1.0e-05
  ds_id:
  - tau_1.0e-6
callbacks:
- type: los_trv_azi_boundary
  name: boundary-tau_1.0
  ds_id: tau_1.0
- type: los_trv_azi_boundary
  name: boundary-tau_1.0e-6
  ds_id: tau_1.0e-6
- type: metrics
  name: metrics-tau_1.0
  ds_id: cube
- type: slices
  ds_id: slices
transforms:
- type: height
  height_range:
  - 0
  - 20
  ds_id:
  - tau_1.0e-6
loss_scaling:
- type: b_height
  name: b_height
  loss_ids:
  - force_free
  - potential
