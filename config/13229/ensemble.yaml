run:
  mode: single
  geometry: cartesian
  output_dir: /glade/work/rjarolim/nf2/sharp/13229/ensemble_v2/{name}
  work_dir: /glade/derecho/scratch/rjarolim/nf2/ensemble_{name}
logging:
  project: AR 13229
  name: VP weighting {weighting} - v2
data:
  parameters:
    num_workers: 8
    iterations: 10000
    z_range:
    - 0
    - 300
    validation_pixel_per_ds: 128
    batch_size: 8192
    random_config:
      batch_size: 16384
  train:
  - type: sharp
    ds_id: sharp
    fits_path:
      Br: /glade/campaign/hao/radmhd/rjarolim/AR13229/sharps/13229_large/20230224_193600_TAI.Br.fits
      Bt: /glade/campaign/hao/radmhd/rjarolim/AR13229/sharps/13229_large/20230224_193600_TAI.Bt.fits
      Bp: /glade/campaign/hao/radmhd/rjarolim/AR13229/sharps/13229_large/20230224_193600_TAI.Bp.fits
    error_path:
      Br_err: /glade/campaign/hao/radmhd/rjarolim/AR13229/sharps/13229_large/20230224_193600_TAI.Br_err.fits
      Bt_err: /glade/campaign/hao/radmhd/rjarolim/AR13229/sharps/13229_large/20230224_193600_TAI.Bt_err.fits
      Bp_err: /glade/campaign/hao/radmhd/rjarolim/AR13229/sharps/13229_large/20230224_193600_TAI.Bp_err.fits
  validation: []
model:
  type: vector_potential
  dim: 256
training:
  epochs: 15
losses:
- type: boundary
  name: boundary
  lambda:
    start: 1000.0
    end: 1.0
    iterations: 50000.0
  ds_id: sharp
- type: boundary
  name: potential
  lambda: 1
  ds_id: potential
- type: force_free
  lambda:
    weighting: null
- type: divergence
  lambda: 0.0
callbacks:
- type: boundary
  name: boundary-sharp
  ds_id: sharp
- type: metrics
  name: metrics
  ds_id: cube
- type: slices
  ds_id: slices
