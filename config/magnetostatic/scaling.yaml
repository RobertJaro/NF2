run:
  mode: single
  geometry: cartesian
  output_dir: /glade/work/rjarolim/nf2/magnetostatic/scaling_v01
  work_dir: /glade/derecho/scratch/rjarolim/nf2/scaling_v01
logging:
  project: magnetostatic
  name: Scaling
data:
  parameters:
    z_range:
    - 0
    - 60
    iterations: 10000
    batch_size: 8192
    random_batch_size: 16384
  train:
  - type: muram_cube
    name: bottom_b
    data_path: /glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_B/3D
    iteration: 474000
    tau: 0.1
    batch_size: 4096
  validation: []
model:
  type: magneto_static
  dim: 256
  encoding_config:
    type: gaussian
    scale: 1
training:
  epochs: 20
losses:
- type: boundary
  name: boundary
  lambda: 1.0
  ds_id:
  - bottom_b
  - potential
- type: magneto_static
  lambda: 0.0001
  height_scaling: false
- type: divergence
  lambda: 0.01
- type: force_free
  lambda: 0.0
- type: p_height_scaling
  lambda: 0.01
