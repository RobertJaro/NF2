run:
  mode: single
  geometry: cartesian
  output_dir: /glade/work/rjarolim/nf2/magnetostatic/pressure_full_cube_v02
  work_dir: /glade/derecho/scratch/rjarolim/nf2/pressure_full_cube_v02
logging:
  project: magnetostatic
  name: Pressure Full Cube
data:
  parameters:
    z_range:
    - 0
    - 60
    iterations: 10000
    batch_size: 8192
    random_batch_size: 16384
  train:
  - type: muram_cube
    data_path: /glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_B/3D
    iteration: 474000
    tau: 0.1
    batch_size: 4096
  - type: muram_pressure
    name: pressure
    data_path: /glade/campaign/hao/radmhd/Rempel/Spot_Motion/case_B/3D
    iteration: 474000
    slice_config:
      type: full
      tau: 0.1
    batch_size: 4096
  validation: []
model:
  type: magneto_static
  dim: 256
training:
  epochs: 20
losses:
- type: boundary
  name: boundary
  lambda:
    start: 1000.0
    end: 1.0
    iterations: 50000.0
  ds_id: boundary_01
- type: boundary
  name: potential
  lambda: 10.0
  ds_id: potential
- type: pressure_boundary
  lambda:
    start: 1000.0
    end: 1.0
    iterations: 50000.0
  ds_id: pressure
- type: divergence
  lambda: 0.01
- type: magneto_static
  lambda: 0.01
- type: force_free
  lambda: 0.0
