run:
  mode: single
  geometry: cartesian
  output_dir: /glade/work/rjarolim/nf2/sst/7310_hmi_v02
  work_dir: /glade/derecho/scratch/rjarolim/nf2/7310_hmi_v02
logging:
  project: nf2-sst
  name: 7310 HMI VP
data:
  parameters:
    num_workers: 8
    iterations: 10000
  train:
  - type: los_trv_azi
    Mm_per_pixel: 0.09
    fits_path:
      B_los: /glade/work/rjarolim/data/SST/converted/hmi_los.fits
      B_trv: /glade/work/rjarolim/data/SST/converted/hmi_trv.fits
      B_azi: /glade/work/rjarolim/data/SST/converted/hmi_azi.fits
  validation: []
model:
  type: vector_potential
  dim: 256
  activation: sine
training:
  epochs: 100
  check_val_every_n_epoch: 1
losses:
- type: boundary_los_trv_azi
  name: boundary_hmi
  lambda: 1.0
  ds_id: boundary_01
  disambiguate: false
- type: boundary
  name: potential_boundary
  lambda: 1.0
  ds_id: potential
- type: force_free
  lambda: 0.01
- type: divergence
  lambda: 0.01
