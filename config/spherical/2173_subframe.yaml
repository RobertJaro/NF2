run:
  mode: single
  geometry: spherical
  output_dir: /glade/work/rjarolim/nf2/spherical/2173_subframe_v01
  work_dir: /glade/derecho/scratch/rjarolim/nf2/2173_subframe_v01
logging:
  project: spherical
  name: 2173 subframe
data:
  parameters:
    max_radius: 1.3
    G_per_dB: 2000
    num_workers: 8
    batch_size: 16384
    iterations: 1000
  train:
  - type: map
    ds_id: AR
    batch_size: 4096
    files:
      Br: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_170000_TAI.Br.fits
      Bt: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_170000_TAI.Bt.fits
      Bp: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_170000_TAI.Bp.fits
      Br_err: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_170000_TAI.Br_err.fits
      Bt_err: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_170000_TAI.Bt_err.fits
      Bp_err: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_170000_TAI.Bp_err.fits
    mask_configs:
      type: heliographic_carrington
      longitude_range:
      - 133.84294094
      - 193.88891787
      latitude_range:
      - -23.7087831
      - 36.33719383
      invert: true
  - type: random_spherical
    ds_id: random
    batch_size: 8192
    longitude_range:
    - 133.84294094
    - 193.88891787
    latitude_range:
    - -23.7087831
    - 36.33719383
  validation:
  - type: map
    ds_id: AR_valid
    filter_nans: false
    shuffle: false
    plot_overview: false
    files:
      Br: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_170000_TAI.Br.fits
      Bt: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_170000_TAI.Bt.fits
      Bp: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_170000_TAI.Bp.fits
      Br_err: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_170000_TAI.Br_err.fits
      Bt_err: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_170000_TAI.Bt_err.fits
      Bp_err: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.20160205_170000_TAI.Bp_err.fits
    mask_configs:
      type: heliographic_carrington
      longitude_range:
      - 133.84294094
      - 193.88891787
      latitude_range:
      - -23.7087831
      - 36.33719383
      invert: true
  - type: spherical_slices
    ds_id: slices
    n_slices: 10
    plot_currents: true
    longitude_range:
    - 133.84294094
    - 193.88891787
    latitude_range:
    - -23.7087831
    - 36.33719383
  - type: sphere
    ds_id: sphere
    longitude_range:
    - 133.84294094
    - 193.88891787
    latitude_range:
    - -23.7087831
    - 36.33719383
model:
  type: vector_potential
  dim: 512
training:
  epochs: 1000
losses:
- type: boundary
  name: boundary
  lambda:
    start: 1000.0
    end: 1.0
    iterations: 50000.0
  ds_id: AR
- type: energy_gradient
  lambda: 1.0
  ds_id: random
  base_radius: 1.04
- type: potential
  lambda: 0.01
  ds_id: random
  base_radius: 1.04
- type: force_free
  lambda: 0.1
