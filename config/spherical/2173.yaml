run:
  mode: single
  geometry: spherical
  output_dir: /glade/work/rjarolim/nf2/spherical/2173/{time}_v01
  work_dir: /glade/derecho/scratch/rjarolim/nf2/{time}_v01
logging:
  project: spherical
  name: 2173 {time}
data:
  parameters:
    max_radius: 1.3
    G_per_dB: 500
    num_workers: 16
    batch_size: 16384
  train:
  - type: map
    ds_id: full_disk
    batch_size: 4096
    files:
      Br: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.{time}_TAI.Br.fits
      Bt: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.{time}_TAI.Bt.fits
      Bp: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.{time}_TAI.Bp.fits
  - type: map
    ds_id: synoptic
    batch_size: 4096
    files:
      Br: /glade/work/rjarolim/data/global/fd_2173/hmi.synoptic_mr_polfil_720s.2173.Mr_polfil.fits
      Bt: /glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bt.fits
      Bp: /glade/work/rjarolim/data/global/fd_2173/hmi.b_synoptic.2173.Bp.fits
    mask_configs:
      type: reference
      file: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.{time}_TAI.Br.fits
  - type: random_radial_grouped
    ds_id: random
    batch_size: 16384
    length: 10000.0
  validation:
  - type: map
    ds_id: full_disk_valid
    filter_nans: false
    shuffle: false
    plot_overview: false
    files:
      Br: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.{time}_TAI.Br.fits
      Bt: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.{time}_TAI.Bt.fits
      Bp: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.{time}_TAI.Bp.fits
      Br_err: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.{time}_TAI.Br_err.fits
      Bt_err: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.{time}_TAI.Bt_err.fits
      Bp_err: /glade/work/rjarolim/data/global/fd_2173/full_disk/hmi.b_720s.{time}_TAI.Bp_err.fits
    mask_configs:
      type: heliographic_carrington
      longitude_range:
      - 82.85
      - 244.83
      latitude_range:
      - -78.34
      - 65.71
      invert: true
  - type: spherical_slices
    ds_id: slices
    n_slices: 10
    plot_currents: true
    longitude_range:
    - 82.85
    - 244.83
    latitude_range:
    - -78.34
    - 65.71
  - type: sphere
    ds_id: sphere
    longitude_range:
    - 82.85
    - 244.83
    latitude_range:
    - -78.34
    - 65.71
model:
  type: vector_potential
  dim: 256
  encoding_config:
    type: gaussian
training:
  epochs: 30
losses:
- type: boundary
  name: boundary
  lambda: 1.0
  ds_id:
  - full_disk
  - synoptic
- type: force_free
  name: force_free
  lambda: 0.001
  ds_id:
  - random
- type: potential
  name: potential
  lambda: 0.0001
  ds_id:
  - random
- type: energy_gradient
  name: energy_gradient
  lambda: 0.001
  ds_id:
  - random
callbacks:
- type: boundary
  name: boundary
  ds_id: full_disk_valid
- type: metrics
  name: metrics
  ds_id: sphere
- type: spherical_slices
  ds_id: slices
loss_scaling:
- type: b_height
  name: b_height
  loss_ids:
  - force_free
  - potential
  - energy_gradient
- type: radial
  name: radial
  base_radius: 1.1
  loss_ids:
  - energy_gradient
  - potential
