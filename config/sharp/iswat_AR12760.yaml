run:
  mode: single
  geometry: cartesian
  output_dir: /glade/work/rjarolim/nf2/iswat_AR12760/version01
  work_dir: /glade/derecho/scratch/rjarolim/nf2/iswat_AR12760_v01
logging:
  project: ISWAT AR12760
  name: Version 1
data:
  parameters:
    num_workers: 8
    batch_size: 8192
    random_batch_size: 16384
    iterations: 10000
    G_per_dB: 100
    z_range:
    - 0
    - 105
    boundary_config:
      type: potential_top
      batch_size: 1024
  train:
  - type: numpy
    data_path: /glade/work/rjarolim/data/nf2/iswat_AR12760/bxyz.npy
  validation: []
model:
  type: vector_potential_scaled
  dim: 256
  encoding_config:
    type: periodic_gaussian
training:
  epochs: 20
losses:
- type: boundary
  name: boundary
  lambda: 1.0
  ds_id: boundary_01
  b_scaling: true
- type: boundary
  name: potential_boundary
  lambda: 1.0
  ds_id: potential
  b_scaling: true
- type: force_free
  lambda: 0.001
  b_scaling: true
- type: divergence
  lambda: 0.0
  b_scaling: true
